name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer derives the version from full git history + tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore db-mcp.sln

      - name: Build
        run: dotnet build db-mcp.sln -c Release --no-restore

      - name: Test
        run: dotnet test db-mcp.sln -c Release --no-build --verbosity normal
